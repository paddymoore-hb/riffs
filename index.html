<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Downloads</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    width: 100%; height: 380px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .hero:hover { background: #1a1a1a; }
  .hero img.hero-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 60%);
    pointer-events: none; z-index: 1;
  }
  .hero-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    z-index: 2; pointer-events: none;
  }
  .hero-placeholder .icon {
    width: 64px; height: 64px;
    border: 2px dashed var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: var(--muted);
  }
  .hero-placeholder p { font-size: 13px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .hero.has-image .hero-placeholder { display: none; }
  .hero-change-btn {
    position: absolute; bottom: 16px; right: 16px; z-index: 3;
    background: rgba(0,0,0,0.7); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px;
    padding: 8px 16px; font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer;
    display: none; transition: border-color 0.2s, color 0.2s;
  }
  .hero-change-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hero:hover .hero-change-btn, .hero.has-image .hero-change-btn { display: block; }
  .hero input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; }

  /* HEADER */
  header {
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    letter-spacing: 2px; line-height: 0.9; color: var(--accent);
  }
  .subtitle {
    color: var(--muted); font-size: 13px;
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
  }

  /* ADD FORM */
  .add-section {
    padding: 40px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .add-section h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 1px; color: var(--muted); margin-bottom: 24px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 100px 1fr 1fr 160px 1fr auto;
    gap: 16px; align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

  .art-upload {
    width: 100px; height: 100px;
    border: 2px dashed var(--border); border-radius: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden; background: var(--bg);
  }
  .art-upload:hover { border-color: var(--accent); background: #111; }
  .art-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .art-upload span { font-size: 10px; color: var(--muted); text-align: center; padding: 8px; z-index: 1; }
  .art-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  input[type="text"], select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text);
    padding: 12px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%;
    appearance: none;
  }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }
  select option { background: #1a1a1a; color: var(--text); }

  .file-field {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 11px 14px;
    font-size: 13px; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.2s; position: relative;
  }
  .file-field:hover { border-color: var(--accent); color: var(--text); }
  .file-field input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-field .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }

  button.add-btn {
    background: var(--accent); color: #000; border: none; border-radius: 4px;
    padding: 12px 28px; font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 1px; cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
    height: 46px; display: flex; align-items: center;
  }
  button.add-btn:hover { opacity: 0.85; }
  button.add-btn:active { transform: scale(0.97); }

  /* GENRE MANAGER */
  .genre-manager {
    padding: 16px 40px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .genre-manager > span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  #genreTags { display: flex; gap: 8px; flex-wrap: wrap; }
  .genre-tag {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .genre-tag:hover { border-color: #444; color: var(--text); }
  .genre-tag .remove-genre { opacity: 0.4; cursor: pointer; font-size: 11px; transition: opacity 0.2s; }
  .genre-tag .remove-genre:hover { opacity: 1; color: #ff5555; }
  .add-genre-wrap { display: flex; gap: 8px; margin-left: 4px; }
  #newGenreInput {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text);
    padding: 4px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    outline: none; width: 130px; transition: border-color 0.2s;
  }
  #newGenreInput:focus { border-color: var(--accent); }
  #newGenreInput::placeholder { color: var(--muted); }
  .add-genre-wrap button {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 20px;
    padding: 4px 14px; font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .add-genre-wrap button:hover { border-color: var(--accent); color: var(--accent); }

  /* TRACKS SECTION */
  .tracks-section { padding: 40px; }

  .genre-section { margin-bottom: 52px; }

  .genre-heading {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .genre-accent { width: 6px; height: 30px; border-radius: 2px; background: var(--accent); flex-shrink: 0; }
  .genre-heading h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px; letter-spacing: 2px; color: var(--text);
  }
  .genre-count {
    font-size: 11px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 20px; margin-left: auto;
  }

  .tracks-list { display: grid; gap: 3px; }

  /* TRACK ROW */
  .track-row {
    background: var(--surface); border-radius: 6px;
    overflow: hidden; animation: fadeIn 0.3s ease;
    transition: background 0.15s;
  }
  .track-row:hover { background: var(--surface2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .track-main {
    display: grid;
    grid-template-columns: 64px 1fr auto auto auto;
    gap: 16px; align-items: center; padding: 12px 16px;
  }

  .track-art {
    width: 64px; height: 64px; border-radius: 4px;
    object-fit: cover; background: var(--bg);
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .track-art.placeholder {
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }

  .track-info .title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .track-info .meta { font-size: 12px; color: var(--muted); }
  .track-info .meta .genre-pill {
    color: var(--accent); opacity: 0.75; font-style: italic;
  }

  /* Play button */
  .play-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s, transform 0.15s;
    color: #000; font-size: 13px; font-weight: bold;
  }
  .play-btn:hover { opacity: 0.85; transform: scale(1.08); }
  .play-btn.playing { background: #fff; }

  .download-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: 4px;
    padding: 9px 18px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-decoration: none; white-space: nowrap;
  }
  .download-btn:hover {
    border-color: var(--accent); color: var(--accent);
    background: rgba(232,255,71,0.05);
  }

  .delete-btn {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; padding: 8px; border-radius: 4px;
    font-size: 16px; line-height: 1; transition: color 0.2s;
  }
  .delete-btn:hover { color: #ff5555; }

  /* AUDIO PLAYER BAR */
  .player-bar {
    padding: 0 16px 14px 96px;
    display: none; gap: 12px; align-items: center;
  }
  .player-bar.visible { display: flex; }
  .player-bar audio { display: none; }

  .progress-wrap {
    flex: 1; height: 3px; background: var(--border);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  .progress-wrap:hover { height: 5px; }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; width: 0%;
    pointer-events: none; transition: none;
  }
  .time-label {
    font-size: 11px; color: var(--muted); white-space: nowrap;
    min-width: 76px; text-align: right; font-variant-numeric: tabular-nums;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 80px 40px; color: var(--muted);
    border: 1px dashed var(--border); border-radius: 8px;
  }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  @media (max-width: 900px) {
    .form-grid { grid-template-columns: 80px 1fr 1fr; grid-template-rows: auto auto auto; }
    .form-grid > *:last-child { grid-column: 1 / -1; }
  }
  @media (max-width: 600px) {
    header { padding: 32px 20px 24px; }
    .add-section, .genre-manager, .tracks-section { padding-left: 20px; padding-right: 20px; }
    .track-main { grid-template-columns: 48px 1fr auto auto; }
    .player-bar { padding-left: 64px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero" id="heroSection" onclick="document.getElementById('heroInput').click()">
  <input type="file" id="heroInput" accept="image/*" onclick="event.stopPropagation()" onchange="setHeroImage(this)">
  <div class="hero-placeholder">
    <div class="icon">🖼️</div>
    <p>Click to upload hero image</p>
  </div>
  <div class="hero-overlay"></div>
  <button class="hero-change-btn" onclick="event.stopPropagation(); document.getElementById('heroInput').click()">Change Image</button>
</div>

<!-- HEADER -->
<header>
  <div>
    <p class="subtitle">Your Music</p>
    <h1>DOWNLOADS</h1>
  </div>
  <div style="text-align:right">
    <p class="subtitle">Add tracks below</p>
    <p style="font-size:13px; color:var(--muted)">Files stay in your browser</p>
  </div>
</header>

<!-- ADD TRACK FORM -->
<div class="add-section">
  <h2>+ ADD TRACK</h2>
  <div class="form-grid">
    <div class="field">
      <label>Album Art</label>
      <div class="art-upload" id="artUploadBox">
        <span>Click to upload</span>
        <input type="file" id="artInput" accept="image/*" onchange="previewArt(this)">
      </div>
    </div>
    <div class="field">
      <label>Track Title</label>
      <input type="text" id="titleInput" placeholder="e.g. Song Name">
    </div>
    <div class="field">
      <label>Artist</label>
      <input type="text" id="artistInput" placeholder="e.g. Artist Name">
    </div>
    <div class="field">
      <label>Genre</label>
      <select id="genreSelect"></select>
    </div>
    <div class="field">
      <label>MP3 File</label>
      <div class="file-field">
        <span>🎵</span>
        <span class="file-name" id="fileName">Choose MP3...</span>
        <input type="file" id="mp3Input" accept="audio/mp3,audio/*" onchange="updateFileName(this)">
      </div>
    </div>
    <button class="add-btn" onclick="addTrack()">ADD</button>
  </div>
</div>

<!-- GENRE MANAGER -->
<div class="genre-manager">
  <span>Genres:</span>
  <div id="genreTags"></div>
  <div class="add-genre-wrap">
    <input type="text" id="newGenreInput" placeholder="New genre..." onkeydown="if(event.key==='Enter') addGenre()">
    <button onclick="addGenre()">+ Add</button>
  </div>
</div>

<!-- TRACKS -->
<div class="tracks-section" id="tracksSection">
  <div class="empty-state">
    <div class="big-icon">🎶</div>
    <p>No tracks yet — add your first MP3 above</p>
  </div>
</div>

<script>
  let tracks = [];
  let genres = ['Hip-Hop', 'R&B', 'Pop', 'Electronic', 'Indie'];
  let currentAudio = null;
  let currentPlayBtn = null;
  let currentBar = null;

  function init() {
    renderGenreSelect();
    renderGenreTags();
  }

  // ── Genre management ──
  function renderGenreSelect() {
    const sel = document.getElementById('genreSelect');
    const cur = sel.value;
    sel.innerHTML = genres.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('');
    if (cur && genres.includes(cur)) sel.value = cur;
  }

  function renderGenreTags() {
    document.getElementById('genreTags').innerHTML = genres.map(g => `
      <span class="genre-tag">
        ${esc(g)}
        <span class="remove-genre" onclick="removeGenre('${esc(g)}')" title="Remove genre">✕</span>
      </span>`).join('');
  }

  function addGenre() {
    const input = document.getElementById('newGenreInput');
    const val = input.value.trim();
    if (!val || genres.includes(val)) { input.value = ''; return; }
    genres.push(val);
    input.value = '';
    renderGenreSelect();
    renderGenreTags();
  }

  function removeGenre(g) {
    if (genres.length <= 1) { alert("You need at least one genre."); return; }
    const fallback = genres.find(x => x !== g) || 'Uncategorized';
    genres = genres.filter(x => x !== g);
    tracks = tracks.map(t => t.genre === g ? {...t, genre: fallback} : t);
    renderGenreSelect();
    renderGenreTags();
    renderAllTracks();
  }

  // ── Hero ──
  function setHeroImage(input) {
    if (!input.files[0]) return;
    const hero = document.getElementById('heroSection');
    const existing = hero.querySelector('img.hero-img');
    if (existing) existing.remove();
    const img = document.createElement('img');
    img.src = URL.createObjectURL(input.files[0]);
    img.className = 'hero-img';
    hero.insertBefore(img, hero.firstChild);
    hero.classList.add('has-image');
  }

  function previewArt(input) {
    if (!input.files[0]) return;
    const box = document.getElementById('artUploadBox');
    const existing = box.querySelector('img');
    if (existing) existing.remove();
    const img = document.createElement('img');
    img.src = URL.createObjectURL(input.files[0]);
    box.querySelector('span').style.display = 'none';
    box.appendChild(img);
  }

  function updateFileName(input) {
    document.getElementById('fileName').textContent = input.files[0] ? input.files[0].name : 'Choose MP3...';
  }

  // ── Add track ──
  function addTrack() {
    const title = document.getElementById('titleInput').value.trim() || 'Untitled Track';
    const artist = document.getElementById('artistInput').value.trim() || 'Unknown Artist';
    const genre = document.getElementById('genreSelect').value;
    const mp3File = document.getElementById('mp3Input').files[0];
    const artFile = document.getElementById('artInput').files[0];
    if (!mp3File) { alert('Please select an MP3 file.'); return; }

    tracks.push({
      id: Date.now(), title, artist, genre,
      mp3Url: URL.createObjectURL(mp3File),
      mp3Name: mp3File.name,
      artUrl: artFile ? URL.createObjectURL(artFile) : null,
    });

    renderAllTracks();
    resetForm();
  }

  function removeTrack(id) {
    // Stop if playing
    const audio = document.getElementById(`audio-${id}`);
    if (audio && !audio.paused) stopCurrent();
    tracks = tracks.filter(t => t.id !== id);
    renderAllTracks();
  }

  // ── Render ──
  function renderAllTracks() {
    const section = document.getElementById('tracksSection');
    if (!tracks.length) {
      section.innerHTML = `<div class="empty-state"><div class="big-icon">🎶</div><p>No tracks yet — add your first MP3 above</p></div>`;
      return;
    }

    const usedGenres = genres.filter(g => tracks.some(t => t.genre === g));
    // Also catch any tracks with genres not in list
    const extraGenres = [...new Set(tracks.map(t => t.genre).filter(g => !genres.includes(g)))];
    const allGenres = [...usedGenres, ...extraGenres];

    section.innerHTML = allGenres.map(genre => {
      const gt = tracks.filter(t => t.genre === genre);
      if (!gt.length) return '';
      return `
        <div class="genre-section">
          <div class="genre-heading">
            <div class="genre-accent"></div>
            <h2>${esc(genre.toUpperCase())}</h2>
            <span class="genre-count">${gt.length} track${gt.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="tracks-list">
            ${gt.map(t => trackHTML(t)).join('')}
          </div>
        </div>`;
    }).join('');
  }

  function trackHTML(t) {
    return `
      <div class="track-row" id="row-${t.id}">
        <div class="track-main">
          ${t.artUrl
            ? `<img class="track-art" src="${t.artUrl}" alt="">`
            : `<div class="track-art placeholder">🎵</div>`}
          <div class="track-info">
            <div class="title">${esc(t.title)}</div>
            <div class="meta">${esc(t.artist)} &middot; <span class="genre-pill">${esc(t.genre)}</span></div>
          </div>
          <button class="play-btn" id="play-${t.id}" onclick="togglePlay(${t.id})" title="Preview">▶</button>
          <a class="download-btn" href="${t.mp3Url}" download="${t.mp3Name}">↓ Download</a>
          <button class="delete-btn" onclick="removeTrack(${t.id})" title="Remove">✕</button>
        </div>
        <div class="player-bar" id="player-${t.id}">
          <audio id="audio-${t.id}" src="${t.mp3Url}" preload="none"></audio>
          <div class="progress-wrap" id="progwrap-${t.id}" onclick="seekAudio(${t.id}, event)">
            <div class="progress-fill" id="prog-${t.id}"></div>
          </div>
          <span class="time-label" id="time-${t.id}">0:00 / 0:00</span>
        </div>
      </div>`;
  }

  // ── Audio player ──
  function stopCurrent() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    if (currentPlayBtn) { currentPlayBtn.textContent = '▶'; currentPlayBtn.classList.remove('playing'); }
    if (currentBar) currentBar.classList.remove('visible');
    currentAudio = null; currentPlayBtn = null; currentBar = null;
  }

  function togglePlay(id) {
    const audio = document.getElementById(`audio-${id}`);
    const btn = document.getElementById(`play-${id}`);
    const bar = document.getElementById(`player-${id}`);

    if (currentAudio === audio) {
      // Toggle same track
      if (audio.paused) {
        audio.play();
        btn.textContent = '⏸'; btn.classList.add('playing');
        bar.classList.add('visible');
      } else {
        audio.pause();
        btn.textContent = '▶'; btn.classList.remove('playing');
      }
      return;
    }

    // Stop previous
    stopCurrent();

    // Play new
    audio.play();
    btn.textContent = '⏸'; btn.classList.add('playing');
    bar.classList.add('visible');
    currentAudio = audio; currentPlayBtn = btn; currentBar = bar;

    audio.ontimeupdate = () => {
      const prog = document.getElementById(`prog-${id}`);
      const time = document.getElementById(`time-${id}`);
      if (audio.duration) {
        prog.style.width = (audio.currentTime / audio.duration * 100) + '%';
        time.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
      }
    };
    audio.onended = () => {
      btn.textContent = '▶'; btn.classList.remove('playing');
      bar.classList.remove('visible');
      const prog = document.getElementById(`prog-${id}`);
      if (prog) prog.style.width = '0%';
      currentAudio = null; currentPlayBtn = null; currentBar = null;
    };
  }

  function seekAudio(id, e) {
    const audio = document.getElementById(`audio-${id}`);
    if (!audio || !audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  }

  function fmt(s) {
    const m = Math.floor(s / 60);
    return `${m}:${Math.floor(s % 60).toString().padStart(2,'0')}`;
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function resetForm() {
    ['titleInput','artistInput'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('mp3Input').value = '';
    document.getElementById('artInput').value = '';
    document.getElementById('fileName').textContent = 'Choose MP3...';
    const box = document.getElementById('artUploadBox');
    const img = box.querySelector('img');
    if (img) img.remove();
    box.querySelector('span').style.display = '';
  }

  init();
</script>
</body>
</html>
